name: Publish

on:
  push:
    branches: [master]

# Prevent concurrent publishes — never cancel an in-progress publish
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ── Gate: only proceed if this is a PR merge and the version is unpublished ──
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decision.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if this push is a PR merge
        id: merge
        run: |
          PARENT_COUNT=$(git rev-list --parents -n 1 HEAD | wc -w)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          # Merge commit: 3+ words (sha + 2 parents)
          # Squash merge from PR: message contains "(#<number>)"
          if [[ "$PARENT_COUNT" -gt 2 ]] || [[ "$COMMIT_MSG" =~ \(#[0-9]+\) ]]; then
            echo "is_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_merge=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Push to master is not a PR merge. Skipping publish."
          fi

      - name: Extract version from package.json
        id: version
        if: steps.merge.outputs.is_merge == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$VERSION" == *"alpha"* ]]; then
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"beta"* ]]; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"rc"* ]]; then
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already published on npm
        id: npm
        if: steps.merge.outputs.is_merge == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@solanticai/vguard@$VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already published to npm. Skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if git tag already exists
        id: git_tag
        if: steps.merge.outputs.is_merge == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists. Skipping."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine whether to publish
        id: decision
        run: |
          IS_MERGE="${{ steps.merge.outputs.is_merge }}"
          ALREADY_PUBLISHED="${{ steps.npm.outputs.already_published }}"
          TAG_EXISTS="${{ steps.git_tag.outputs.tag_exists }}"

          if [[ "$IS_MERGE" == "true" && "$ALREADY_PUBLISHED" != "true" && "$TAG_EXISTS" != "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Publish to npm with OIDC trusted publishing ──
  publish:
    needs: [preflight]
    if: needs.preflight.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm install
      - run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --tag ${{ needs.preflight.outputs.npm_tag }}

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.preflight.outputs.tag }}" -m "Release ${{ needs.preflight.outputs.tag }}"
          git push origin "${{ needs.preflight.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}

  # ── Post changelog to GitHub Discussions ──
  changelog:
    needs: [preflight, publish]
    if: needs.preflight.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      discussions: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG="${{ needs.preflight.outputs.tag }}"

          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [<version>]" to the next "## [" heading
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
            }
            found && !/^## \[/ { print }
          ' CHANGELOG.md)

          # Get commit list since previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            COMMITS=$(git log --oneline -20)
          fi

          # Build the discussion body
          BODY=$(cat <<HEREDOC
          # VGuard $TAG

          **Released:** $(date -u +%Y-%m-%d)
          **Install:** \`npm install @solanticai/vguard@$VERSION\`

          ## What's Changed

          $CHANGELOG

          ## Commits

          \`\`\`
          $COMMITS
          \`\`\`

          ---

          **Full changelog:** https://github.com/solanticai/vibe-guard/blob/master/CHANGELOG.md
          **npm:** https://www.npmjs.com/package/@solanticai/vguard/v/$VERSION
          **Release:** https://github.com/solanticai/vibe-guard/releases/tag/$TAG
          HEREDOC
          )

          # Write to file to avoid escaping issues
          echo "$BODY" > /tmp/changelog-body.md
          echo "title=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get repository and category IDs
        id: ids
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh api graphql -f query='
            query {
              repository(owner: "solanticai", name: "vibe-guard") {
                id
                discussionCategories(first: 20) {
                  nodes { id name }
                }
              }
            }
          ')

          REPO_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['repository']['id'])")
          CATEGORY_ID=$(echo "$RESULT" | python3 -c "
          import sys, json
          cats = json.load(sys.stdin)['data']['repository']['discussionCategories']['nodes']
          print(next(c['id'] for c in cats if c['name'] == 'Changelog'))
          ")

          echo "repo_id=$REPO_ID" >> "$GITHUB_OUTPUT"
          echo "category_id=$CATEGORY_ID" >> "$GITHUB_OUTPUT"

      - name: Create changelog discussion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat /tmp/changelog-body.md)
          TITLE="${{ steps.changelog.outputs.title }}"
          REPO_ID="${{ steps.ids.outputs.repo_id }}"
          CATEGORY_ID="${{ steps.ids.outputs.category_id }}"

          # Escape for JSON
          BODY_ESCAPED=$(echo "$BODY" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          gh api graphql -f query="
            mutation {
              createDiscussion(input: {
                repositoryId: \"$REPO_ID\",
                categoryId: \"$CATEGORY_ID\",
                title: \"$TITLE\",
                body: $BODY_ESCAPED
              }) {
                discussion { url }
              }
            }
          "

          echo "::notice::Changelog discussion created for $TITLE"
