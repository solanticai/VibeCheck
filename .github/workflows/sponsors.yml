# =============================================================================
# Anthril — Sponsor Sync (Repo-Level)
# =============================================================================
# Updates README.md and SPONSORS.md in individual project repos.
# Drop this into .github/workflows/ of any Anthril repo.
#
# Setup:
#   1. Add the SPONSORS_TOKEN secret to the repo (or use an org-level secret)
#   2. Ensure README.md and SPONSORS.md contain the "sponsors" marker comments
# =============================================================================

name: Sync Sponsors

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    name: Update sponsor listings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "SPONSORS.md — Sponsors"
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: "SPONSORS.md"
          organization: true
          minimum: 10000
          marker: "sponsors"
          template: '<a href="https://github.com/{{{ login }}}"><img src="https://github.com/{{{ login }}}.png" width="80px" alt="{{{ login }}}" /></a>&nbsp;&nbsp;'

      - name: "README.md — Sponsors"
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: "README.md"
          organization: true
          minimum: 10000
          marker: "sponsors"
          template: '<a href="https://github.com/{{{ login }}}"><img src="https://github.com/{{{ login }}}.png" width="80px" alt="{{{ login }}}" /></a>&nbsp;&nbsp;'

      - name: Deploy changes
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: master
          folder: "."
          clean: false
          commit-message: "chore: sync sponsor listings [automated]"
