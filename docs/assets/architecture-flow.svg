<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">VGuard Architecture Flow</title>
  <desc id="arch-desc">Left-to-right flow: Developer Prompt → AI Agent → VGuard → Pass or Block</desc>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { fill: #1F2937; font-size: 14px; font-weight: 600; }
    .sublabel { fill: #6B7280; font-size: 11px; }
    .arrow { stroke: #9CA3AF; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .box { rx: 10; ry: 10; stroke-width: 1.5; }
    .pass-label { fill: #15803D; font-size: 13px; font-weight: 600; }
    .block-label { fill: #DC2626; font-size: 13px; font-weight: 600; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #F3F4F6; }
      .sublabel { fill: #9CA3AF; }
      .arrow { stroke: #6B7280; }
    }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Developer Prompt -->
  <rect x="20" y="60" width="150" height="80" class="box" fill="#EFF6FF" stroke="#BFDBFE" />
  <text x="95" y="96" text-anchor="middle" class="label">Developer</text>
  <text x="95" y="114" text-anchor="middle" class="sublabel">Prompt</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="220" y2="100" class="arrow" />

  <!-- AI Agent -->
  <rect x="220" y="60" width="150" height="80" class="box" fill="#EFF6FF" stroke="#93C5FD" />
  <text x="295" y="96" text-anchor="middle" class="label">AI Agent</text>
  <text x="295" y="114" text-anchor="middle" class="sublabel">Claude · Cursor · Codex</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="100" x2="420" y2="100" class="arrow" />

  <!-- VGuard -->
  <rect x="420" y="50" width="160" height="100" class="box" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" />
  <text x="500" y="90" text-anchor="middle" class="label" style="font-size:16px;">VGuard</text>
  <text x="500" y="110" text-anchor="middle" class="sublabel">Rules · Presets</text>
  <text x="500" y="126" text-anchor="middle" class="sublabel">vguard.config.ts</text>

  <!-- Arrow to PASS -->
  <line x1="580" y1="80" x2="650" y2="50" class="arrow" />

  <!-- Arrow to BLOCK -->
  <line x1="580" y1="120" x2="650" y2="150" class="arrow" />

  <!-- PASS -->
  <rect x="650" y="20" width="200" height="56" class="box" fill="#F0FDF4" stroke="#16A34A" />
  <text x="750" y="44" text-anchor="middle" class="pass-label">PASS</text>
  <text x="750" y="62" text-anchor="middle" class="sublabel" style="fill:#15803D;">Change applied</text>

  <!-- BLOCK -->
  <rect x="650" y="124" width="200" height="56" class="box" fill="#FEF2F2" stroke="#DC2626" />
  <text x="750" y="148" text-anchor="middle" class="block-label">BLOCK</text>
  <text x="750" y="166" text-anchor="middle" class="sublabel" style="fill:#991B1B;">Explanation + fix</text>
</svg>
