<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" role="img" aria-labelledby="layers-title layers-desc">
  <title id="layers-title">VGuard Rule Layers</title>
  <desc id="layers-desc">Five stacked horizontal layers from bottom to top: Security, Quality, Workflow, Custom, and Analytics</desc>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .layer-label { fill: #FFFFFF; font-size: 14px; font-weight: 600; }
    .layer-detail { fill: rgba(255,255,255,0.85); font-size: 11px; }
    .tier-label { fill: #6B7280; font-size: 11px; }
    .bar { rx: 6; ry: 6; }
    @media (prefers-color-scheme: dark) {
      .tier-label { fill: #9CA3AF; }
    }
  </style>

  <!-- Tier labels (left) -->
  <text x="18" y="42" class="tier-label">Layer 5</text>
  <text x="18" y="90" class="tier-label">Layer 4</text>
  <text x="18" y="138" class="tier-label">Layer 3</text>
  <text x="18" y="186" class="tier-label">Layer 2</text>
  <text x="18" y="234" class="tier-label">Layer 1</text>

  <!-- Analytics — top -->
  <rect x="80" y="20" width="500" height="40" class="bar" fill="#6B7280" />
  <text x="330" y="37" text-anchor="middle" class="layer-label">Analytics</text>
  <text x="330" y="52" text-anchor="middle" class="layer-detail">VGuard Cloud · drift alerts · team dashboards</text>

  <!-- Custom -->
  <rect x="80" y="68" width="500" height="40" class="bar" fill="#7C3AED" />
  <text x="330" y="85" text-anchor="middle" class="layer-label">Custom Rules</text>
  <text x="330" y="100" text-anchor="middle" class="layer-detail">Your project-specific guardrails</text>

  <!-- Workflow -->
  <rect x="80" y="116" width="500" height="40" class="bar" fill="#D97706" />
  <text x="330" y="133" text-anchor="middle" class="layer-label">Workflow</text>
  <text x="330" y="148" text-anchor="middle" class="layer-detail">commit-conventions · pr-reminder · migration-safety · 7 rules</text>

  <!-- Quality -->
  <rect x="80" y="164" width="500" height="40" class="bar" fill="#2563EB" />
  <text x="330" y="181" text-anchor="middle" class="layer-label">Quality</text>
  <text x="330" y="196" text-anchor="middle" class="layer-detail">import-aliases · naming-conventions · hallucination-guard · 11 rules</text>

  <!-- Security — bottom -->
  <rect x="80" y="212" width="500" height="40" class="bar" fill="#DC2626" />
  <text x="330" y="229" text-anchor="middle" class="layer-label">Security</text>
  <text x="330" y="244" text-anchor="middle" class="layer-detail">branch-protection · secret-detection · prompt-injection · 7 rules</text>
</svg>
